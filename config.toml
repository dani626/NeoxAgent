[agent]
host = "0.0.0.0"
port = 8443
api_key = "change-me-to-a-secure-random-string"
data_dir = "/home/dani626/neox_data"

# CORS allowed origins.
# Supports exact origins and wildcard subdomain patterns.
# Examples:
#   "https://panel.neoxhost.com"   → exact match
#   "*.neoxhost.com"               → any subdomain of neoxhost.com
#   "http://localhost:3000"        → local dev
# Leave empty ([]) to allow ALL origins (development only — not safe for production).
cors_origins = [
  "https://panel.neoxhost.com",
  "*.neoxhost.com",
  "http://localhost:3000",
]

[podman]
socket = "/tmp/podman_demo_dani626.sock"
volumes_dir = "/home/dani626/neox_servers"

[tls]
enabled = false
cert_path = ""
key_path = ""

[defaults]
restart_policy = "always"
dns = ["1.1.1.1", "8.8.8.8"]

[backups]
max_per_server = 5
max_size_gb = 10
retention_days = 30
compression_level = 6
stop_server_before_backup = true
